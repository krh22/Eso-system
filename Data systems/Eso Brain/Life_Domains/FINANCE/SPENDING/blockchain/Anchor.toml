[toolchain]

[features]
seeds = false
skip-lint = false

[programs.localnet]
ecs_vault = "ECS_VAULT_PROGRAM_ID_PLACEHOLDER"

[programs.mainnet]
ecs_vault = "ECS_VAULT_PROGRAM_ID_PLACEHOLDER"

[registry]
url = "https://api.apr.com"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
